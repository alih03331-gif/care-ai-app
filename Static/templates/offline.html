<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShiftCare — Offline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,0.06) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px 40px;text-align:center;max-width:400px;position:relative;}
.logo-icon{width:64px;height:64px;background:linear-gradient(135deg,#38bdf8,#0284c7);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:0 0 30px rgba(56,189,248,0.4);}
.offline-icon{font-size:48px;margin-bottom:16px;}
h1{font-size:24px;font-weight:800;margin-bottom:10px;color:#fff;}
p{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:24px;}
.btn{background:linear-gradient(135deg,#38bdf8,#0ea5e9);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="logo-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <path d="M12 4v16M4 12h16" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="offline-icon">📡</div>
  <h1>You're Offline</h1>
  <p>Please check your internet connection and try again. ShiftCare needs internet to work.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
